name: Build VSIX on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win32-x64
          - os: macos-latest
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run prune:duckdb-bindings

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        run: vsce package --target ${{ matrix.target }} -o vscode-data-viewer-${{ matrix.target }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-data-viewer-${{ matrix.target }}
          path: vscode-data-viewer-${{ matrix.target }}.vsix

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: vscode-data-viewer-*
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-data-viewer-*.vsix
          generate_release_notes: true
